<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">今日の星座占い</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="lang-toggle">
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn active" id="btn-ja" onclick="setLang('ja')">日本語</button>
    </div>

    <header>
      <h1 data-i18n="title">今日の星座占い</h1>
      <p class="date" id="today-date"></p>
    </header>

    <section class="sign-selector">
      <p class="label" data-i18n="selectLabel">星座を選んでください</p>
      <div class="sign-grid" id="sign-grid"></div>
    </section>

    <section class="result" id="result" hidden>
      <div class="result-header">
        <span class="result-sign-icon" id="result-icon"></span>
        <h2 id="result-sign-name"></h2>
      </div>
      <div class="cards">
        <div class="card">
          <div class="card-label" data-i18n="overall">総合</div>
          <div class="stars" id="stars-overall"></div>
          <p class="card-text" id="text-overall"></p>
        </div>
        <div class="card">
          <div class="card-label" data-i18n="love">恋愛</div>
          <div class="stars" id="stars-love"></div>
          <p class="card-text" id="text-love"></p>
        </div>
        <div class="card">
          <div class="card-label" data-i18n="work">仕事</div>
          <div class="stars" id="stars-work"></div>
          <p class="card-text" id="text-work"></p>
        </div>
        <div class="card">
          <div class="card-label" data-i18n="money">金運</div>
          <div class="stars" id="stars-money"></div>
          <p class="card-text" id="text-money"></p>
        </div>
      </div>
      <p class="lucky"><span data-i18n="luckyLabel">ラッキーカラー：</span><span id="lucky-color"></span></p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
