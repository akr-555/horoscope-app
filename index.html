<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔮 今日の星座占い ✨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔮 今日の星座占い ✨</h1>
      <p class="date" id="today-date"></p>
    </header>

    <section class="sign-selector">
      <p class="label">💫 星座を選んでね 💫</p>
      <div class="sign-grid" id="sign-grid"></div>
    </section>

    <section class="result" id="result" hidden>
      <div class="result-header">
        <span class="result-emoji" id="result-emoji"></span>
        <div>
          <h2 id="result-sign-name"></h2>
          <p class="result-sub">今日の運勢</p>
        </div>
      </div>

      <div class="cards">
        <div class="card card-overall">
          <div class="card-top">
            <span class="card-emoji">🌟</span>
            <span class="card-label">総合運</span>
          </div>
          <div class="stars" id="stars-overall"></div>
          <p class="card-text" id="text-overall"></p>
        </div>
        <div class="card card-love">
          <div class="card-top">
            <span class="card-emoji">💕</span>
            <span class="card-label">恋愛運</span>
          </div>
          <div class="stars" id="stars-love"></div>
          <p class="card-text" id="text-love"></p>
        </div>
        <div class="card card-work">
          <div class="card-top">
            <span class="card-emoji">💼</span>
            <span class="card-label">仕事運</span>
          </div>
          <div class="stars" id="stars-work"></div>
          <p class="card-text" id="text-work"></p>
        </div>
        <div class="card card-money">
          <div class="card-top">
            <span class="card-emoji">🍀</span>
            <span class="card-label">金運</span>
          </div>
          <div class="stars" id="stars-money"></div>
          <p class="card-text" id="text-money"></p>
        </div>
      </div>

      <div class="lucky-box">
        <span class="lucky-title">🌈 ラッキーカラー</span>
        <span class="lucky-value" id="lucky-color"></span>
      </div>
      <div class="lucky-box">
        <span class="lucky-title">🔢 ラッキーナンバー</span>
        <span class="lucky-value" id="lucky-number"></span>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
